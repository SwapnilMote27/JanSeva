<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="8" stdDeviation="12" flood-color="#047857" flood-opacity="0.3" />
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#grad)" />
  
  <!-- Hero Shield Icon -->
  <g filter="url(#shadow)" transform="translate(96, 96)">
    <!-- Outer Shield -->
    <path d="M160 20 L280 60 C280 180, 220 260, 160 300 C100 260, 40 180, 40 60 Z" fill="#ffffff" />
    <!-- Inner Shield (Emerald) -->
    <path d="M160 36 L260 72 C260 172, 208 240, 160 276 C112 240, 60 172, 60 72 Z" fill="url(#grad)" />
    <!-- Hero Star / Flash Symbol -->
    <path d="M160 80 L185 135 L245 140 L200 180 L212 240 L160 210 L108 240 L120 180 L75 140 L135 135 Z" fill="#fbbf24" />
  </g>
</svg>
